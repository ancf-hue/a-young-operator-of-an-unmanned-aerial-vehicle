<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс «Оператор БПЛА» — 25 уроков для детей</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.55);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-cyan: #38bdf8;
            --accent-purple: #818cf8;
            --accent-green: #22c55e;
            --accent-pink: #ec4899;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* === КВАДРАТНЫЙ ЛОГОТИП ПО ЦЕНТРУ === */
        .header-icon {
            width: 80px;
            height: 80px;
            background-image: url('favicon.ico');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 12px; /* Лёгкое скругление углов как у иконки приложения */
            box-shadow: 
                0 0 20px rgba(56, 189, 248, 0.6),
                0 0 40px rgba(129, 140, 248, 0.4),
                inset 0 0 0 1px rgba(255, 255, 255, 0.15);
            animation: pulse 3s ease-in-out infinite;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            background-color: rgba(15, 23, 42, 0.4);
        }

        @keyframes pulse {
            0%, 100% { 
                box-shadow: 
                    0 0 20px rgba(56, 189, 248, 0.6),
                    0 0 40px rgba(129, 140, 248, 0.4),
                    inset 0 0 0 1px rgba(255, 255, 255, 0.15);
            }
            50% { 
                box-shadow: 
                    0 0 30px rgba(56, 189, 248, 0.9),
                    0 0 60px rgba(129, 140, 248, 0.6),
                    inset 0 0 0 1px rgba(255, 255, 255, 0.25);
            }
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .progress-container {
            width: 100%;
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 12px;
            background: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan), var(--accent-purple));
            background-size: 200% 100%;
            width: 0%;
            transition: width 0.5s ease;
            animation: progressShine 3s linear infinite;
        }

        @keyframes progressShine {
            to { background-position: 200% 0; }
        }

        .progress-text {
            font-weight: bold;
            color: var(--accent-cyan);
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* Сетка: 5 колонок */
        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 1400px) {
            .board { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 1100px) {
            .board { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 800px) {
            .board { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .board { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.25);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -5px rgba(56, 189, 248, 0.35);
            border-color: rgba(56, 189, 248, 0.6);
        }

        .card h3 {
            margin-bottom: 12px;
            color: var(--accent-cyan);
            font-size: 1.05rem;
            line-height: 1.3;
            min-height: 50px;
        }

        .card p {
            flex-grow: 1;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }

        /* === СТЕКЛЯННЫЕ 3D-КНОПКИ С ПЕРЕЛИВОМ === */
        .btn-glass {
            position: relative;
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            isolation: isolate;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                inset 0 -2px 5px rgba(0, 0, 0, 0.2),
                0 4px 10px rgba(56, 189, 248, 0.3),
                0 2px 4px rgba(0, 0, 0, 0.3);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .btn-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                120deg,
                rgba(56, 189, 248, 0.6) 0%,
                rgba(129, 140, 248, 0.6) 25%,
                rgba(236, 72, 153, 0.6) 50%,
                rgba(129, 140, 248, 0.6) 75%,
                rgba(56, 189, 248, 0.6) 100%
            );
            background-size: 300% 100%;
            opacity: 0.7;
            transition: opacity 0.3s;
            z-index: -1;
            animation: gradientShift 4s linear infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .btn-glass::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -100%;
            width: 50%;
            height: 200%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transform: skewX(-25deg);
            transition: left 0.6s;
        }

        .btn-glass:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -2px 5px rgba(0, 0, 0, 0.2),
                0 8px 25px rgba(56, 189, 248, 0.6),
                0 4px 10px rgba(129, 140, 248, 0.4),
                0 0 30px rgba(236, 72, 153, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-glass:hover::before {
            opacity: 1;
        }

        .btn-glass:hover::after {
            left: 150%;
        }

        .btn-glass:active {
            transform: translateY(-1px) scale(1.01);
        }

        .btn-complete {
            margin-top: 10px;
            width: 100%;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: var(--accent-green);
        }

        .btn-complete::before {
            background: linear-gradient(
                120deg,
                rgba(34, 197, 94, 0.5) 0%,
                rgba(56, 189, 248, 0.5) 50%,
                rgba(34, 197, 94, 0.5) 100%
            );
            background-size: 200% 100%;
            animation: gradientShift 4s linear infinite;
        }

        .btn-complete:hover {
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.4),
                0 8px 25px rgba(34, 197, 94, 0.5),
                0 0 25px rgba(34, 197, 94, 0.3);
            border-color: rgba(34, 197, 94, 0.8);
        }

        .completed {
            background: rgba(34, 197, 94, 0.08);
            border-color: rgba(34, 197, 94, 0.5);
        }

        .completed h3 {
            color: var(--accent-green);
        }

        .completed .btn-complete {
            background: rgba(34, 197, 94, 0.3);
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-icon" aria-label="Логотип курса"></div>
        <h1>Курс «Оператор БПЛА»</h1>
        <p>25 интерактивных уроков в симуляторе для юных пилотов</p>
    </header>

    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">Пройдено: 0 из 25</span>
    </div>

    <main class="board" id="board"></main>

    <footer>
        <p>Anti-AI Qwen Academy | Проект Антона Кузнецова</p>
    </footer>

    <script>
        const lessons = [
            { id: 1, repo: "-Anti-AI-Qwen-UAV-Simulator-Lesson-1-Target-", title: "Знакомство с дроном и взлёт", desc: "Изучаем части дрона, проверяем пропеллеры и учимся плавно взлетать на заданную высоту." },
            { id: 2, repo: "anti-ai-qwen-uav-simulator-lesson-2", title: "Зависание на высоте", desc: "Удерживаем дрон в одной точке, как настоящая муха! Тренируем точность работы газом." },
            { id: 3, repo: "anti-ai-qwen-uav-simulator-lesson-3", title: "Движение вперёд и назад", desc: "Осваиваем тангаж (Pitch) и учимся тормозить, чтобы не столкнуться со стеной." },
            { id: 4, repo: "anti-ai-qwen-uav-simulator-lesson-4", title: "Движение влево и вправо", desc: "Осваиваем крен (Roll) для боковых манёвров и облёта препятствий." },
            { id: 5, repo: "anti-ai-qwen-uav-simulator-lesson-5", title: "Повороты на месте", desc: "Осваиваем рыскание (Yaw), учимся смотреть по сторонам и ориентироваться в пространстве." },
            { id: 6, repo: "anti-ai-qwen-uav-simulator-lesson-6", title: "Полёт по квадрату", desc: "Комбинируем базовые движения, рисуем квадрат в воздухе и возвращаемся на базу." },
            { id: 7, repo: "anti-ai-qwen-uav-simulator-lesson-7", title: "Посадка на мишень", desc: "Тренируем ювелирную точность приземления строго в заданный круг (Target)." },
            { id: 8, repo: "anti-ai-qwen-uav-simulator-lesson-8", title: "Облёт статичных препятствий", desc: "Учимся замечать деревья, столбы и стены, маневрируя в ограниченном пространстве." },
            { id: 9, repo: "anti-ai-qwen-uav-simulator-lesson-9", title: "Полёт сквозь кольцо", desc: "Тренируем координацию и глазомер, пролетая сквозь подвешенные кольца." },
            { id: 10, repo: "anti-ai-qwen-uav-simulator-lesson-10", title: "Восьмёрка", desc: "Сложная фигура высшего пилотажа! Учимся плавно переходить от крена к тангажу." },
            { id: 11, repo: "anti-ai-qwen-uav-simulator-lesson-11", title: "Действие ветра", desc: "Включаем симуляцию ветра! Компенсируем порывы и удерживаем заданный курс." },
            { id: 12, repo: "anti-ai-qwen-uav-simulator-lesson-12-", title: "Работа с камерой", desc: "Учимся управлять наклоном камеры (Gimbal) для красивой аэросъёмки." },
            { id: 13, repo: "anti-ai-qwen-uav-simulator-lesson-13", title: "Ночной полёт", desc: "Сложный уровень: ориентация в темноте только по передним и задним огням дрона." },
            { id: 14, repo: "anti-ai-qwen-uav-simulator-lesson--14-", title: "Полёт по приборам", desc: "Учимся читать альтиметр (высоту) и компас на экране пульта управления." },
            { id: 15, repo: "anti-ai-qwen-uav-simulator-lesson-15", title: "Экстренная посадка", desc: "Батарея на нуле! Учимся быстро и безопасно сажать дрон в ближайшем безопасном месте." },
            { id: 16, repo: "anti-ai-qwen-uav-simulator-lesson-16", title: "Потеря сигнала", desc: "Дрон потерял связь! Активация режима Return-to-Home (RTH) и ожидание возвращения." },
            { id: 17, repo: "anti-ai-qwen-uav-simulator-lesson-17", title: "Съёмка движущегося объекта", desc: "Учимся следить за быстрой целью в кадре, удерживая дрон на нужной дистанции." },
            { id: 18, repo: "anti-ai-qwen-uav-simulator-lesson-18", title: "Полёт в тесном пространстве", desc: "Маневренность в помещении без GPS. Учимся летать по инерции и визуальным ориентирам." },
            { id: 19, repo: "anti-ai-qwen-uav-simulator-lesson-19", title: "Основы аэродинамики", desc: "Физика полёта: как пропеллеры создают тягу и подъёмную силу (теория + практика)." },
            { id: 20, repo: "anti-ai-qwen-uav-simulator-lesson-20", title: "Обслуживание дрона", desc: "Интерактивная проверка пропеллеров, моторов и правильности установки батареи." },
            { id: 21, repo: "anti-ai-qwen-uav-simulator-lesson-21", title: "Групповой полёт (Рой)", desc: "Основы синхронизации: управляем сразу несколькими дронами, не сталкивая их друг с другом." },
            { id: 22, repo: "anti-ai-qwen-uav-simulator-lesson-22", title: "Картография местности", desc: "Как дроны помогают создавать 3D-карты? Пролетаем по маршруту для сканирования." },
            { id: 23, repo: "anti-ai-qwen-uav-simulator-lesson-23", title: "Симулятор отказа мотора", desc: "Один мотор вышел из строя! Как безопасно посадить дрон при поломке в воздухе." },
            { id: 24, repo: "anti-ai-qwen-uav-simulator-lesson-24", title: "Прохождение полосы препятствий", desc: "Комплексный зачёт всех навыков: вперёд, назад, кольца, мишени и ночной режим." },
            { id: 25, repo: "anti-ai-qwen-uav-simulator-lesson-25", title: "Финальный экзамен «Спасательная операция»", desc: "Миссия: найди в лесу потерявшегося котёнка, подлети к нему и сфотографируй для спасателей!" }
        ];

        const board = document.getElementById('board');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        let completedLessons = JSON.parse(localStorage.getItem('uav-completed') || '[]');

        function updateProgress() {
            const percentage = (completedLessons.length / lessons.length) * 100;
            progressFill.style.width = percentage + '%';
            progressText.textContent = `Пройдено: ${completedLessons.length} из ${lessons.length}`;
        }

        lessons.forEach(lesson => {
            const card = document.createElement('div');
            card.className = 'card';
            
            if (completedLessons.includes(lesson.id)) {
                card.classList.add('completed');
            }

            card.innerHTML = `
                <h3>Урок ${lesson.id}: ${lesson.title}</h3>
                <p>${lesson.desc}</p>
                <a href="https://ancf-hue.github.io/${lesson.repo}/" target="_blank" class="btn-glass">🚀 Открыть симулятор</a>
                <button class="btn-glass btn-complete">${completedLessons.includes(lesson.id) ? '✓ Выполнено' : 'Отметить как выполненное'}</button>
            `;

            const completeBtn = card.querySelector('.btn-complete');
            completeBtn.addEventListener('click', () => {
                if (completedLessons.includes(lesson.id)) {
                    completedLessons = completedLessons.filter(id => id !== lesson.id);
                    card.classList.remove('completed');
                    completeBtn.textContent = 'Отметить как выполненное';
                } else {
                    completedLessons.push(lesson.id);
                    card.classList.add('completed');
                    completeBtn.textContent = '✓ Выполнено';
                }
                localStorage.setItem('uav-completed', JSON.stringify(completedLessons));
                updateProgress();
            });

            board.appendChild(card);
        });

        updateProgress();
    </script>
</body>
</html>
